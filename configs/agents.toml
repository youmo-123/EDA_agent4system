# 四个 Agent 的配置：允许 Tool、允许 Skill、Prompt 路径、资源上限

[master]
role = "MASTER"
system_prompt = "templates/prompts/master/system.md"
skills = [
  "templates/skills/master/workflow-supervision/SKILL.md",
  "templates/skills/master/evidence-review/SKILL.md",
  "templates/skills/master/gate-resolution/SKILL.md",
  "templates/skills/master/resource-scheduling/SKILL.md",
  "templates/skills/master/round-retrospective/SKILL.md",
  "templates/skills/master/final-reporting/SKILL.md",
]
allowed_tools = [
  "master_schedule_task",
  "master_create_workspace",
  "master_materialize_exchange",
  "master_verify_artifacts",
  "master_resolve_gate",
  "master_archive_round",
  "master_publish_outputs",
]

